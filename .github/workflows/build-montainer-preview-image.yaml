name: Build Montainer (Preview) Image

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'frontend/**'
      - 'acceptance/**'
      - 'test/**'
      - 'examples/docker/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.dockerignore'
      - 'versions/preview.txt'
      - 'versions/preview.url'
      - 'versions/preview.sha256'
      - '.github/workflows/ci.yaml'
      - '.github/workflows/build-test-promote-image.yaml'
      - '.github/workflows/promote-tested-image.yaml'
      - '.github/workflows/build-montainer-preview-image.yaml'
  workflow_dispatch:
    inputs:
      publish:
        description: Promote the tested candidate to preview release tags
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: montainer-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Source quality gates
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yaml

  image:
    name: Build and acceptance-test preview
    needs: quality
    permissions:
      contents: read
    uses: ./.github/workflows/build-test-promote-image.yaml
    with:
      server_type: preview
      version_file: versions/preview.txt
      acceptance_suites: '["smoke", "lifecycle", "otel-export", "otel-outage", "otel-flush", "backup"]'

  promote:
    name: Promote accepted preview image
    needs: image
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.publish)
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/promote-tested-image.yaml
    with:
      server_type: preview
      source_before: ${{ github.event.before || github.sha }}
      artifact_name: ${{ needs.image.outputs.artifact_name }}
      archive_sha256: ${{ needs.image.outputs.archive_sha256 }}
      image_id: ${{ needs.image.outputs.image_id }}
      version: ${{ needs.image.outputs.version }}
      registry_image: ghcr.io/wasinuddy/montainer-preview
