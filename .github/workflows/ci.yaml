name: CI

on:
  pull_request:
  push:
    branches: [main, v2]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check frontend
        working-directory: frontend
        run: |
          npm run lint
          npm test
          npm run build

      - name: Test Go backend and acceptance features
        run: go test -race -count=1 ./...

      - name: Vet Go backend
        run: go vet ./...
