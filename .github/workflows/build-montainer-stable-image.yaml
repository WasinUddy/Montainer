name: Build Montainer (Stable) Image

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'frontend/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.dockerignore'
      - 'versions/stable.txt'
      - '.github/workflows/build-montainer-stable-image.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: montainer-stable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yaml

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Bedrock version
        run: echo "STABLE_VERSION=$(cat versions/stable.txt)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish stable image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: SERVER_TYPE=stable
          tags: |
            ghcr.io/wasinuddy/montainer-stable:latest
            ghcr.io/wasinuddy/montainer-stable:${{ env.STABLE_VERSION }}-${{ github.sha }}
          cache-from: type=gha,scope=stable
          cache-to: type=gha,mode=max,scope=stable
